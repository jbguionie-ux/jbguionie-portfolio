<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sélection privée — Jean-Baptiste Guionie</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=DM+Sans:opsz,wght@9..40,300..500&family=DM+Mono:wght@300..500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="playlist-page">

<header>
  <a href="/" class="logo">JB Guionie <span>·</span> Voix Off</a>
  <div class="private-badge">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="10" height="7" rx="1"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg>
    Lien privé
  </div>
</header>

<div class="container">

  <!-- HERO PLAYLIST — rempli dynamiquement -->
  <section class="playlist-hero" id="playlist-hero">
    <div class="loading">Chargement de la sélection…</div>
  </section>

  <!-- EXTRAITS — rempli dynamiquement -->
  <section class="extracts" id="extracts-list">
  </section>

  <!-- SIGNATURE -->
  <section class="signature">
    <p class="signature-text">Cette sélection a été préparée spécifiquement pour vous. <br>N'hésitez pas à me contacter pour toute question ou demande complémentaire.</p>
    <div class="signature-contact">
      <a href="mailto:jbguionie@gmail.com">jbguionie@gmail.com</a>
      <a href="tel:+33664808425">06 64 80 84 25</a>
      <a href="mailto:agenceo.djo@gmail.com">Agent — L'Agence O.djo</a>
    </div>
  </section>

  <div class="footer-bottom">
    <div id="footer-slug">Lien privé</div>
    <div id="footer-expiry"></div>
  </div>

</div>

<!-- Lecteur -->
<div class="player" id="player">
  <button class="player-play" id="player-play-btn">
    <svg id="player-play-icon" viewBox="0 0 10 12" fill="currentColor"><polygon points="0,0 10,6 0,12"/></svg>
  </button>
  <div class="player-info">
    <strong id="player-title">—</strong><span id="player-client">—</span>
  </div>
  <div class="player-time">
    <span id="player-current">0:00</span> / <span id="player-duration">0:00</span>
  </div>
  <div class="player-actions">
    <a class="player-btn" id="player-download" title="Télécharger MP3" download>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v9M8 11l-3.5-3.5M8 11l3.5-3.5M2.5 13.5h11"/></svg>
    </a>
  </div>
</div>

<audio id="audio-player" preload="metadata"></audio>

<script src="/assets/js/playlist.js"></script>

</body>
</html>
